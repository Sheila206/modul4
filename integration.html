<!DOCTYPE html>
<html lang="da">

<head>
    <!-- Basic meta settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <!-- Page title -->
    <title>Røde Kors</title>
    <!-- Main stylesheet -->
    <link rel="stylesheet" href="stylesheet.css">
    <script src="js/dropdown-tekst.js"></script>
    <!-- java script til carousel -->
    <script src="js/billede-carousel.js" defer> </script>
</head>

<!-- body -->
<!-- Billeder er brugt gratis fra Pexels.com - https://www.pexels.com/search/young%20tutor/ - 
 Der er også brugt billeder fra Røde Kors' hjemmeside ift. hvilke aktiviteter de tilbyder. -->

<body class="page-projektervalg">
    <main class="container">


        <!--//////////////// CAROUSEL ////////////////-->
        <section class="hero">
            <div class="hero__carousel-container">
                <div class="hero__carousel-slides">
                    <!-- Slide 1 -->
                    <div class="hero__kort hero__slide active">
                        <img src="images/flygtninge-gdt.jpg" alt="Billede af en mand og en dame, der står inde i et kykken, hvor manden er ved at tilberede mad i en gryde. De er glade og kigger begge ned i gryden">
                        <div class="hero__top">
                            <img class="hero__logo" src="images/logo-hvid.svg" alt="logo">
                        </div>
                        <br><br>
                        <div class="hero__midt">
                            <h1 class="hero__titel">Integrationscafé</h1>
                        </div>
                    </div>

                    <!-- Slide 2 -->
                    <div class="hero__kort hero__slide active">
                        <img src="images/integration-gdt.jpg" alt="Billede af ung mand og dame, der sidder ved et cafébord og interesseret kigger, og peger på en tablet skærm">
                        <div class="hero__top">
                            <img class="hero__logo" src="images/logo-hvid.svg" alt="logo">
                        </div>
                        <br><br>
                        <div class="hero__midt">
                            <h1 class="hero__titel">Integrationscafé</h1>
                        </div>
                    </div>

                    <!-- Slide 3 -->
                    <div class="hero__kort hero__slide active">
                        <img src="images/integration2-gdt.jpg" alt="Billede af ung mand og dame, der sidder ved et cafébord. De har en samtale, hvor damen forklarer noget til den glade mand">
                        <div class="hero__top">
                            <img class="hero__logo" src="images/logo-hvid.svg" alt="logo">
                        </div>
                        <br><br>
                        <div class="hero__midt">
                            <h1 class="hero__titel">Integrationscafé</h1>
                        </div>
                    </div>
                </div>

                <!-- Navigationsknapper -->
                <button class="hero__nav hero__nav--prev" aria-label="Forrige billede">❮</button>
                <button class="hero__nav hero__nav--next" aria-label="Næste billede">❯</button>

                <!-- Indikatorprikker -->
                <div class="hero__dots"></div>
            </div>
        </section>
        <!--//////////////// CAROUSEL ////////////////-->
        <section class="sektion">
            <h2 class="sektion__titel">Status og data</h2>
            <div class="grid">
                <button class="knap knap--sekundaer">
                    <span>Menn. du har hjulpet</span>
                    <span>0</span>
                </button>
                <button class="knap knap--sekundaer">
                    <span>Tid du har hjulpet</span>
                    <span>0t.</span>
                </button>
            </div>
        </section>
        <section class="sektion">
            <h2 class="sektion__titel">Om frivilligarbejdet</h2>
            <div class="dropdown">
                <button class="dropdown-header">
                    <span>Om frivilligarbejdet</span>
                    <span class="trekant"></span>
                </button>
                <div class="dropdown-content">
                    <h3> [Indsæt]</h3>
                    <p> [Indsæt]
                    </p>
                    <br>
                    <p>[Indsæt] </p>
                    <br>
                </div>
            </div>
            <div class="dropdown">
                <button class="dropdown-header">
                    <span>Hvordan hjælper jeg?</span>
                    <span class="trekant"></span>
                </button>
                <div class="dropdown-content">
                    <h3>Frivillig</h3>
                    <p>[Indsæt]

                    </p>
                </div>
            </div>
            <div class="dropdown">
                <button class="dropdown-header">
                    <span>Tid og sted</span>
                    <span class="trekant"></span>
                </button>
                <div class="dropdown-content">
                    <h3>Sted</h3>
                    <p>[Indsæt]</p> <br>
                    <h3>Tidspunkt</h3>
                    <p>[Indsæt]</p> <br>
                </div>
            </div>
        </section>
        <br><br><br>
        <div class="login">
            <div class="form__bund">
                <a href="main.html" class="knap knap--primaer">Tilmeld</a>
            </div>
        </div>
        <br>
    </main>

    <!-- Footer -->
    <footer>
        <nav class="nav">
            <img src="images/primaer-logo.svg" alt="logo" class="nav__logo">
            <div class="nav__menu">
                <a href="main.html" class="nav__item">
                    <span class="icon icon--hjem"></span>
                    <span class="nav__label">Hjem</span>
                </a>
                <a href="findprojekt.html" class="nav__item nav__item--aktiv">
                    <span class="icon icon--tilfoej"></span>
                    <span class="nav__label">Find aktiviteter</span>
                </a>
                <a href="kalender.html" class="nav__item">
                    <span class="icon icon--kalender"></span>
                    <span class="nav__label">Kalender</span>
                </a>
                <a href="profil.html" class="nav__item">
                    <span class="icon icon--profil"></span>
                    <span class="nav__label">Profil</span>
                </a>
            </div>
        </nav>
    </footer>
</body>

</html>
