<!DOCTYPE html>
<html lang="da">

<head>
    <!-- Basic meta settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">

    <!-- Page title -->
    <title>Røde Kors</title>

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="stylesheet.css">
</head>

<!-- body -->

<body>
    <main class="container">
        <!-- find projekter -->
        <section class="hero">
            <div class="hero__top">
                <img class="hero__logo" src="images/logo.svg" alt="logo">
               <span class="icon icon--filter" onclick="toggleFilter()"></span>
            </div>
        </section>
        <section class="sektion">
            <h2 class="sektion__titel">Find projeker</h2>
            <div class="grid">
                <a href="#" class="kort" data-location="odense" data-type="cafe">
                    <div class="kort__billede"></div>
                    <div class="kort__overlay">
                        <h3 class="kort__titel">Integrationscafé</h3>
                        <p class="kort__dag">Tirsdag</p>
                        <p class="kort__tid">17-20</p>
                    </div>
                </a>
              <a href="#" class="kort" data-location="odense" data-type="sortering">
                    <div class="kort__billede"></div>
                    <div class="kort__overlay">
                        <h3 class="kort__titel">Sortering</h3>
                        <p class="kort__dag">Mandag</p>
                        <p class="kort__tid">10-13</p>
                    </div>
                </a>
              <a href="#" class="kort" data-location="odense" data-type="indsamling">
                    <div class="kort__billede"></div>
                    <div class="kort__overlay">
                        <h3 class="kort__titel">Café</h3>
                        <p class="kort__dag">Onsdag</p>
                        <p class="kort__tid">18-21</p>
                    </div>
                </a>
                <a href="#" class="kort">
                    <div class="kort__billede"></div>
                    <div class="kort__overlay">
                        <h3 class="kort__titel">Indsamling</h3>
                        <p class="kort__dag">Søndag</p>
                        <p class="kort__tid">09-14</p>
                    </div>
                </a>
            </div>
        </section>
        <section>
            <h2 class="sektion__titel">Nye projeker</h2>
        </section>
        <section class="hero">
            <div class="hero__kort">
                <div class="hero__midt">
                    <h2 class="hero__titel">Hjælp til i genbrugsbutik</h2>
                </div>
                <button class="knap knap--sekundaer">Læs mere</button>
            </div>
        </section>
    </main>

    <!-- Footer -->

    <footer>
        <nav class="nav">
            <a href="main.html" class="nav__item">
                <span class="icon icon--hjem"></span>
            </a>
            <a href="findprojekt.html" class="nav__item nav__item--aktiv">
                <span class="icon icon--tilfoej"></span>
            </a>
            <a href="kalender.html" class="nav__item">
                <span class="icon icon--kalender"></span>
            </a>
            <a href="profil.html" class="nav__item">
                <span class="icon icon--profil"></span>
            </a>
        </nav>
    </footer>
    

<!-- FILTER MODAL -->
<div class="filter" id="filter">
  <div class="filter__overlay"></div>

  <div class="filter__content">
    <div class="filter__header">
      <h2>Præferencer for frivilligt arbejde</h2>
      <span class="filter__close" onclick="toggleFilter()">✕</span>
    </div>

    <!-- SLIDER -->
    <div class="filter__box">
      <label>Mængde af tid om ugen:</label>
      <input type="range" min="1" max="40" value="16" id="timerRange">
      <p id="timerValue">16 t.</p>
    </div>

    <!-- LOCATION -->
    <div class="filter__gruppe">
      <h3>Hvor i Danmark</h3>
      <label><input type="checkbox" value="odense" class="filter-location"> Odense</label>
      <label><input type="checkbox" value="aarhus" class="filter-location"> Aarhus</label>
      <label><input type="checkbox" value="kbh" class="filter-location"> København</label>
    </div>

    <!-- TYPE -->
    <div class="filter__gruppe">
      <h3>Type opgave</h3>
      <label><input type="checkbox" value="cafe" class="filter-type"> Café</label>
      <label><input type="checkbox" value="sortering" class="filter-type"> Sortering</label>
      <label><input type="checkbox" value="indsamling" class="filter-type"> Indsamling</label>
    </div>
    <div class="filter__actions">
  <button class="knap knap--sekundaer" onclick="resetFilters()">Nulstil</button>
  <button class="knap knap--primaer" onclick="applyAndSave()">Anvend filtre</button>
</div>
  </div>
</div>
<script src="js/filtrering.js" defer></script>
</body>


</html>
