<!DOCTYPE html>
<html lang="da">

<head>
    <!-- Basic meta settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">

    <!-- Page title -->
    <title>Røde Kors</title>

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="stylesheet.css">
</head>

<!-- body -->

<body>
    <main class="container">
        <section class="hero">
            <div class="hero__kort">
                <img class="hero__logo" src="images/primaer-logo.svg" alt="logo">
            </div>
        </section>
        <section class="login">
            <h2 class="sektion__titel">Log ind</h2>
            <form class="form" onsubmit="event.preventDefault(); login();"></form>
            <form class="form">
                <div class="form__felt">
                    <label class="form__label" for="brugernavn">Brugernavn</label>
                    <input class="input" id="brugernavn" type="text">
                </div>
                <div class="form__felt">
                    <label class="form__label" for="adgangskode">Adgangskode</label>
                    <input class="input" id="adgangskode" type="password">
                    <p id="message"></p>
                </div>
                <a class="knap knap--sekundaer" href="opretbruger.html">Opret profil</a>
                <div class="form__bund">
                    <button type="submit" class="knap knap--primaer">Log ind</button>
                </div>
            </form>
        </section>
    </main>
    <!-- Footer -->
    <footer>
    </footer>

     <script src="js/login.js"></script>

</body>
</html>
