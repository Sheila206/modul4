<!DOCTYPE html>
<html lang="da">

<head>
    <!-- Basic meta settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">

    <!-- Page title -->
    <title>Røde Kors</title>

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="stylesheet.css">

    <!-- java script til carousel -->
    <script src="js/billede-carousel.js" defer> </script>
</head>

<!-- body -->

<body class="page-logind">
    <main class="container">

<!------------------//////////////// CAROUSEL ////////////////------------------------->
        <section class="hero">
            <div class="hero__carousel-container">
                <div class="hero__carousel-slides">
                    <!-- Slide 1 -->
                    <div class="hero__kort hero__slide active">
                        <img src="images/indsamling.jpg" alt="Landsindsamling">
                        <div class="hero__top">
                            <img class="hero__logo" src="images/primaer-logo-hvid.svg" alt="logo">
                        </div>
                    </div>

                    <!-- Slide 2 -->
                    <div class="hero__kort hero__slide active">
                        <img src="images/sotering.webp" alt="Landsindsamling">
                        <div class="hero__top">
                            <img class="hero__logo" src="images/primaer-logo-hvid.svg" alt="logo">
                        </div>
                    </div>

                    <!-- Slide 3 -->
                    <div class="hero__kort hero__slide active">
                        <img src="images/strik.jpg" alt="Landsindsamling">
                        <div class="hero__top">
                            <img class="hero__logo" src="images/primaer-logo-hvid.svg" alt="logo">
                        </div>
                    </div>

                    <!-- Slide 4 -->
                    <div class="hero__kort hero__slide active">
                        <img src="images/flygtninge.jpg" alt="Landsindsamling">
                        <div class="hero__top">
                            <img class="hero__logo" src="images/primaer-logo-hvid.svg" alt="logo">
                        </div>
                    </div>

                    <!-- Slide 5 -->
                    <div class="hero__kort hero__slide active">
                        <img src="images/onlinefrivillig.jpg" alt="Landsindsamling">
                        <div class="hero__top">
                            <img class="hero__logo" src="images/primaer-logo-hvid.svg" alt="logo">
                        </div>
                    </div>

                </div>

                <!-- Navigationsknapper -->
                <button class="hero__nav hero__nav--prev" aria-label="Forrige billede">❮</button>
                <button class="hero__nav hero__nav--next" aria-label="Næste billede">❯</button>

                <!-- Indikatorprikker -->
                <div class="hero__dots"></div>
            </div>
        </section>
        <!-------------------//////////////// CAROUSEL ////////////////------------------------>

        <section class="login">
            <h2 class="sektion__titel">Log ind</h2>
            <form class="form" onsubmit="event.preventDefault(); login();">
            <form class="form">
                <div class="form__felt">
                    <label class="form__label" for="brugernavn">Brugernavn</label>
                    <input class="input" id="brugernavn" type="text">
                </div>
                <div class="form__felt">
                <label class="form__label" for="adgangskode">Adgangskode</label>
                <input class="input" id="adgangskode" type="password">
                <p id="message"></p>
                </div>
                <a class="knap knap--sekundaer" href="opretbruger.html">Opret profil</a>
                <div class="form__bund">
                    <button type="submit" class="knap knap--primaer">Log ind</button>
                </div>
            </form>
        </section>
    </main>
    <!-- Footer -->
    <footer>
    </footer>

     <script src="js/login.js"></script>

</body>
</html>
