<!DOCTYPE html>
<html lang="da">

<head>
    <!-- Basic meta settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">

    <!-- Page title -->
    <title>Røde Kors</title>

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="stylesheet.css">
</head>

<!-- body -->

<body>
    <main class="container">
        <section class="hero">
            <img class="hero__logo" src="images/logo.svg" alt="logo røde kors frivillig">
            <h2 class="hero__titel">Landsindsamling</h2>
        </section>
        <section class="sektion">
            <h2 class="sektion__titel">Status og data</h2>
            <div class="grid">
                <button class="knap knap--sekundaer">Årets indsamling</button>
                <button class="knap knap--sekundaer">Frivillige</button>
                <button class="knap knap--sekundaer">Mål</button>
                <button class="knap knap--sekundaer">Resultat</button>
            </div>
        </section>
        <section class="sektion">
            <h2 class="sektion__titel">Om frivilligarbejdet</h2>
            <div class="dropdown">
                    <button class="dropdown-header">
                        Om frivilligarbejdet
                        <span class="trekant"></span>
                    </button>
                <div class="dropdown-content">
                    <p> Indsamlingeen i år går til at hjælpe mennesker i krise</p>
                </div>
            </div>

            <div class="dropdown">
                <button class="dropdown-header">
                    Hvordan hjælper jeg?
                    <span class="trekant"></span>
                </button>
                <div class="dropdown-content">
                    <p>Du kan hjælpe ved at samle indd, dele budskabbet eller donere</p>
                </div>
            </div>

            <div class="dropdown">
                    <button class="dropdown-header">
                        Tidsplan
                        <span class="trekant"></span>
                    </button>
                <div class="dropdown-content">
                    <p>Indsamlingen foregår yayay</p>
                </div>
            </div>

        </section>
    </main>

    <!-- Footer -->

    <footer>
        <nav class="nav">
            <a href="main.html" class="nav__item nav__item--aktiv">
                <span class="icon icon--hjem"></span>
            </a>
            <a href="findprojekt.html" class="nav__item">
                <span class="icon icon--tilfoej"></span>
            </a>
            <a href="kalender.html" class="nav__item">
                <span class="icon icon--kalender"></span>
            </a>
            <a href="profil.html" class="nav__item">
                <span class="icon icon--profil"></span>
            </a>
        </nav>
    </footer>

<script src="dropdown-tekst.js"></script>

</html>
