<!DOCTYPE html>
<html lang="da">

<head>
    <!-- Basic meta settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">

    <!-- Page title -->
    <title>Røde Kors</title>

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="stylesheet.css">

    <!-- java script -->
    <script src="js/foedselsdag.js" defer> </script>
</head>

<!-- body -->

<body class="opretbruger">
    <main class="container">
        <section class="hero">
            <div class="hero__kort">
                <a class="knap knap--sekundaer hero__knap" href="index.html">Log ind</a>
                <img class="hero__logo" src="images/primaer-logo.svg" alt="logo">
            </div>
        </section>
        <section class="login">
            <h2 class="sektion__titel">Ny profil</h2>
            <form class="form">
                <div class="form__felt">
                    <label class="form__label" for="navn">Brugernavn</label>
                    <input class="input" id="navn" type="text" placeholder="Sofie4842">
                </div>
                <div class="form__felt">
                    <label class="form__label" for="kode">Adgangskode</label>
                    <input class="input" id="kode" type="password" placeholder="AGP27ASF!">
                </div>
                <div class="form__felt">
                    <label class="form__label" for="email">E-mail</label>
                    <input class="input" id="email" type="email" placeholder="sofiehansen@gmail.com">
                </div>
                <div class="form__felt">
                    <label class="form__label">Fødselsdag</label>
                    <div class="form__row">
                        <select id="dag" class="input">
                            <option value="">Dag</option>
                        </select>
                        <select id="maaned" class="input">
                            <option value="">Måned</option>
                        </select>
                        <select id="aar" class="input">
                            <option value="">År</option>
                        </select>
                    </div>
                </div>
                <div class="form__bund">
                    <a class="knap knap--primaer" href="main.html">Opret profil</a>
                </div>
            </form>
        </section>
    </main>
    <!-- Footer -->
    <footer>
    </footer>
</body>

</html>
