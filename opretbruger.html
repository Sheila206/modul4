<!DOCTYPE html>
<html lang="da">

<head>
    <!-- Basic meta settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <!-- Page title -->
    <title>Røde Kors</title>
    <!-- Main stylesheet -->
    <link rel="stylesheet" href="stylesheet.css">
    <!-- java script -->
    <script src="js/foedselsdag.js" defer> </script>
    <!-- java script til carousel -->
    <script src="js/billede-carousel.js" defer> </script>
</head>

<!-- body -->
<!-- Billeder er brugt gratis fra Pexels.com - https://www.pexels.com/search/young%20tutor/ - 
 Der er også brugt billeder fra Røde Kors' hjemmeside ift. hvilke aktiviteter de tilbyder. -->

 <body class="page-opretbruger">
    <main class="container">

        <!--//////////////// CAROUSEL ////////////////-->
        <div class="hero">
            <div class="hero__carousel-container">
                <div class="hero__carousel-slides">
                    <!-- Slide 1 -->
                    <div class="hero__kort hero__slide active">
                        <img src="images/indsamling-gdt.jpg" alt="Billede af 2 glade kvinder, der er i gang med at samle ind til velgørenhed">
                        <div class="hero__top">
                            <img class="hero__logo" src="images/primaer-logo-hvid.svg" alt="logo">
                        </div>
                    </div>

                    <!-- Slide 2 -->
                    <div class="hero__kort hero__slide active">
                        <img src="images/sortering2.webp" alt="Portrætbillede af en mand og en dame, der står i en genbrugsbutik, damen arbejder der, og den unge mand er besøgende">
                        <div class="hero__top">
                            <img class="hero__logo" src="images/primaer-logo-hvid.svg" alt="logo">
                        </div>
                    </div>

                    <!-- Slide 3 -->
                    <div class="hero__kort hero__slide active">
                        <img src="images/strik-gdt.jpg" alt="Billede af 3 damer, der strikker på en bænk i solvejr. Den midterste dame er ung, og de to andre er ældreårige. Alle ser glade ud">
                        <div class="hero__top">
                            <img class="hero__logo" src="images/primaer-logo-hvid.svg" alt="logo">
                        </div>
                    </div>

                    <!-- Slide 4 -->
                    <div class="hero__kort hero__slide active">
                        <img src="images/flygtninge-gdt.jpg" alt="Billede af en mand og en dame, der står inde i et kykken, hvor manden er ved at tilberede mad i en gryde. De er glade og kigger begge ned i gryden">
                        <div class="hero__top">
                            <img class="hero__logo" src="images/primaer-logo-hvid.svg" alt="logo">
                        </div>
                    </div>

                    <!-- Slide 5 -->
                    <div class="hero__kort hero__slide active">
                        <img src="images/onlinefrivillig-gdt.jpg" alt="Billede af en glad dame, der sidder ved et spisebord ved sin computer, hvorpå man kan se en anden dame, der smiler og vinker over et online opkald">
                        <div class="hero__top">
                            <img class="hero__logo" src="images/primaer-logo-hvid.svg" alt="logo">
                        </div>
                    </div>

                </div>

                <!-- Navigationsknapper -->
                <button class="hero__nav hero__nav--prev" aria-label="Forrige billede">❮</button>
                <button class="hero__nav hero__nav--next" aria-label="Næste billede">❯</button>

                <!-- Indikatorprikker -->
                <div class="hero__dots"></div>
            </div>
        </div>
        <!--//////////////// CAROUSEL ////////////////-->
        <section class="login">
            <h2 class="sektion__titel">Ny profil</h2>
            <form class="form">
                <div class="form__felt">
                    <label class="form__label" for="navn">Brugernavn</label>
                    <input class="input" id="navn" type="text" placeholder="Eks. Sofie4842">
                </div>
                <div class="form__felt">
                    <label class="form__label" for="kode">Adgangskode</label>
                    <input class="input" id="kode" type="password" placeholder="Eks. AGP27ASF!">
                </div>
                <div class="form__felt">
                    <label class="form__label" for="email">E-mail</label>
                    <input class="input" id="email" type="email" placeholder="Eks. sofiehansen@gmail.com">
                </div>
                <div class="form__felt">
                    <label class="form__label">Fødselsdag</label>
                    <div class="form__row">
                        <select id="dag" class="input">
                            <option value="">Dag</option>
                        </select>
                        <select id="maaned" class="input">
                            <option value="">Måned</option>
                        </select>
                        <select id="aar" class="input">
                            <option value="">År</option>
                        </select>
                    </div>
                </div>
                <br><br>
                <a class="knap knap--sekundaer" href="index.html">Log ind</a>
                <br>
                <div class="form__bund">
                    <a class="knap knap--primaer" href="main.html">Opret profil</a>
                </div>
            </form>
        </section>
    </main>
    <!-- Footer -->
    <footer>
    </footer>
</body>

</html>
