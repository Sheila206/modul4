<!DOCTYPE html>
<html lang="da">

<head>

    <!-- Basic meta settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">

    <!-- Page title -->
    <title>Røde Kors</title>

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="stylesheet.css">

</head>
<body>
    <main class="container">
            <section class="hero">
                <div class="hero__kort">
                    <div class="hero__midt">
                        <a class="knap knap--primaer" href="index.html">Log ind</a>
                        <img class="hero__logo" src="images/primaer-logo.svg" alt="logo">
            </section>
        <section class="sektion">
            <h2 class="sektion__titel">Ny profil</h2>
            <form class="form">
                <div class="form__felt">
                    <label class="form__label" for="navn">Brugernavn</label>
                    <input class="input" id="navn" type="text" placeholder="Sofie4842">
                </div>
                <div class="form__felt">
                    <label class="form__label" for="kode">Adgangskode</label>
                    <input class="input" id="kode" type="password" placeholder="AGP27ASF!">
                </div>
                <div class="form__felt">
                    <label class="form__label" for="email">E-mail</label>
                    <input class="input" id="email" type="email" placeholder="sofiehansen@gmail.com">
                </div>
                <div class="form__felt">
                    <label class="form__label">Fødselsdag</label>
                    <div class="form__gruppe">
                        <input class="input" type="number" placeholder="Dag">
                        <input class="input" type="number" placeholder="Måned">
                        <input class="input" type="number" placeholder="År">
                    </div>
                </div>
                <a class="knap knap--primaer" href="main.html">Opret profil</a>
            </form>
        </section>
    </main>
    <!-- Footer -->
    <footer>
    </footer>
</body>

</html>
